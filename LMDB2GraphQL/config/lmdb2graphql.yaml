# lmdb2graphql.yaml — committed container-ready config
#
# This file is the default config mounted read-only into the lmdb2graphql
# container at /root/deepfry/lmdb2graphql.yaml by docker-compose.lmdb2graphql.yml
# (via ${LMDB2GRAPHQL_CONFIG:-./LMDB2GraphQL/config/lmdb2graphql.yaml}).
#
# It contains no secrets. It is safe to commit.
#
# Bare-metal / dev users: copy LMDB2GraphQL/config/lmdb2graphql.yaml.example
# to ~/deepfry/lmdb2graphql.yaml and use bind_address: "127.0.0.1:8080" instead.
# Do NOT edit this file for bare-metal use; it is tuned for in-container operation.

# Path to the directory containing strfry's data.mdb (the LMDB env dir).
# Inside the container this is the read-only mount from ${STRFRY_DB_PATH} on the host.
strfry_db_path: /app/strfry-db

# HTTP bind address for the GraphQL server.
# MUST be 0.0.0.0 inside Docker — 127.0.0.1 binds to the container loopback only
# and is unreachable from the host or deepfry-net (RESEARCH.md Pitfall 2 / OPS-02).
bind_address: "0.0.0.0:8080"

# LMDB map_size in bytes — must match or exceed strfry's configured dbParams.mapsize.
# Default matches config/strfry/strfry.conf: mapsize = 10995116277760 (10 TiB).
map_size: 10995116277760

