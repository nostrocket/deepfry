##
## Quarantine strfry config — captures non-whitelisted events for later analysis.
## This MUST use a different db path from the mainline strfry.conf.
## See quarantine/SPEC.md §6.8.
##

# Distinct from mainline's ./strfry-db/ — the guard script (§6.8.3) refuses to
# start if this matches the mainline path.
db = "./strfry-quarantine-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 315360000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    # Bound on the docker network only; never exposed publicly (see compose `expose:`).
    bind = "0.0.0.0"
    port = 7778
    nofiles = 1000000
    realIpHeader = ""

    info {
        name = "deepfry-quarantine"
        description = "Internal quarantine for non-whitelisted events. Not for public use."
        pubkey = ""
        contact = ""
        icon = ""
        nips = ""
    }

    maxWebsocketPayloadSize = 131072
    maxReqFilterSize = 200
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 20

    writePolicy {
        # Accept-all: the router plugin has already decided what belongs here.
        plugin = ""
        lookbackSeconds = 0
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}
