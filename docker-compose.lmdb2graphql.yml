# docker-compose.lmdb2graphql.yml
#
# lmdb2graphql — DeepFry sidecar service (OPS-02)
#
# Co-located with strfry; mounts the strfry LMDB database read-only (:ro).
# Start alongside the strfry stack:
#
#   docker compose -f docker-compose.strfry.yml \
#                  -f docker-compose.lmdb2graphql.yml up -d
#
# Prerequisites:
#   1. deepfry-net external network must exist:
#        docker network create deepfry-net
#   2. A committed container-ready config is included at
#      ./LMDB2GraphQL/config/lmdb2graphql.yaml and is mounted by default
#      (see LMDB2GRAPHQL_CONFIG below). For non-default deployments, copy
#      LMDB2GraphQL/config/lmdb2graphql.yaml.example and set LMDB2GRAPHQL_CONFIG.
#      The config MUST set:
#        bind_address: "0.0.0.0:8080"
#      Inside the container the default 127.0.0.1 loopback address is unreachable
#      from outside the container. See RESEARCH.md Pitfall 2.
#   3. STRFRY_DB_PATH MUST be set to the same path used by docker-compose.strfry.yml
#      so both services mount the same on-disk LMDB directory. Example (.env):
#        STRFRY_DB_PATH=/Volumes/BACKUP/nostr/strfry_database
#      lmdb2graphql mounts this path read-only (:ro) — strfry mounts it read-write.
#      Leaving STRFRY_DB_PATH unset uses the same ./data/strfry-db fallback as
#      docker-compose.strfry.yml, which is correct for local/dev deployments.

services:
  lmdb2graphql:
    build:
      context: LMDB2GraphQL/
      dockerfile: Dockerfile
    container_name: lmdb2graphql
    restart: unless-stopped
    # Memory containment (DEBUG adapter-crash-heavy-query). The host is an 8 GiB Mac mini
    # whose Docker Desktop VM has only ~3.8 GiB, most of which strfry's LMDB mmap occupies.
    # With NO limit, a heavy-query memory spike lets the VM kernel OOM-killer pick its victim
    # — and strfry (the fattest process) could be the one killed, taking down the relay.
    # This cgroup limit guarantees lmdb2graphql is the process that dies if it balloons
    # (contained, OOMKilled=true — an accurate signal), protecting strfry. 768m sits well
    # above the post-PERF-01 per-request peak (tens of MB). memswap_limit == mem_limit
    # disables container swap so it fails fast instead of thrashing this already-swapping host.
    mem_limit: 768m
    memswap_limit: 768m
    # OOM victim selection (debug adapter-crash-heavy-query, 2026-06-28). Under VM-wide
    # (global) OOM, the kernel killed strfry — the canonical relay — because it was the
    # fattest unprotected process. lmdb2graphql is a disposable read-lens (auto-restarts,
    # holds no canonical data), so it should be the FIRST sacrifice. 1000 = "kill me first":
    # it maximises lmdb2graphql's oom_score so the kernel picks it over strfry (set to -300)
    # whenever the VM runs out of memory. Together with mem_limit this both caps and
    # prioritises lmdb2graphql for OOM.
    oom_score_adj: 1000
    environment:
      RUST_LOG: "info,lmdb2graphql=info"
    volumes:
      # Mount strfry's LMDB read-only. STRFRY_DB_PATH must match docker-compose.strfry.yml.
      # :ro enforces kernel-level read-only even if a code bug attempted a write txn (T-05-05).
      - ${STRFRY_DB_PATH:-./data/strfry-db}:/app/strfry-db:ro
      # Operator-supplied config. MUST set bind_address: "0.0.0.0:8080" for in-container use.
      # Default mounts the committed container-ready config from the repo.
      - ${LMDB2GRAPHQL_CONFIG:-./LMDB2GraphQL/config/lmdb2graphql.yaml}:/root/deepfry/lmdb2graphql.yaml:ro
    ports:
      # Host-level exposure control (CR-01 / ASVS V4 / T-05-06). The in-container
      # bind_address 0.0.0.0:8080 only binds inside the container namespace; THIS publish
      # rule decides what the host exposes.
      #
      # SECURE DEFAULT: 127.0.0.1 — the unauthenticated, full-introspection GraphQL endpoint
      # is reachable only from the host's loopback. Do NOT change the default in the repo.
      #
      # To widen exposure for a specific deployment, set LMDB2GRAPHQL_PUBLISH_ADDR in that
      # host's .env (NOT committed) — e.g. `LMDB2GRAPHQL_PUBLISH_ADDR=0.0.0.0` to reach it
      # from the LAN. This exposes an unauthenticated API to every host that can route here;
      # only do so on a trusted network or behind an authenticating reverse proxy.
      - "${LMDB2GRAPHQL_PUBLISH_ADDR:-127.0.0.1}:8080:8080"
    healthcheck:
      # IMPORTANT: use /health (liveness), NOT /ready.
      # /ready returns 503 before the LMDB self-check completes; using it here would
      # trigger Docker restart loops during startup. (RESEARCH.md Pitfall 5 / T-05-08)
      # Use 127.0.0.1 (NOT localhost): the server binds IPv4 0.0.0.0, but inside Alpine
      # `localhost` resolves to IPv6 ::1 first — wget hits ::1, gets "connection refused",
      # and the container is wrongly marked unhealthy despite a working service.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      # The startup self-check blocks the runtime (no HTTP accept) until all six Event__*
      # indexes are verified against the live DB — ~35s on a 341 GiB DB and growing.
      # start_period must comfortably exceed that, or healthchecks fail mid-self-check and
      # flap the container to "unhealthy" before it is ever ready. (RESEARCH.md Pitfall 5)
      start_period: 120s
    networks:
      - deepfry-net

networks:
  deepfry-net:
    external: true
    name: deepfry-net
