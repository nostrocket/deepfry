services:
  strfry:
    build:
      context: .
      dockerfile: Dockerfile.strfry
    container_name: strfry
    restart: unless-stopped
    # OOM protection (debug adapter-crash-heavy-query, 2026-06-28). On this 8 GiB host the
    # Docker VM (3.83 GiB) suffers VM-wide (global) OOM under heavy adapter load; the kernel
    # repeatedly killed strfry (3× on 2026-06-28) because it is the fattest unprotected
    # process (large LMDB mmap → ~126 MiB page tables). strfry holds the canonical event data
    # and must be the LAST sacrifice. -300 strongly deprioritises it as an OOM victim while
    # staying ABOVE dockerd (-500)/init (-999) so Docker's own infrastructure is never at
    # risk. Paired with oom_score_adj: 1000 on lmdb2graphql (the disposable read-lens), which
    # the kernel now kills first. NB: this steers WHICH process dies, not the underlying
    # capacity shortfall — the durable fix is more RAM / DB on local SSD.
    oom_score_adj: -300
    environment:
      STRFRY_PRIVATE_KEY: ${STRFRY_PRIVATE_KEY:-}
    volumes:
      - ${STRFRY_DB_PATH:-./data/strfry-db}:/app/strfry-db
      - ./config/strfry/strfry.conf:/etc/strfry.conf:ro
      - ./config/whitelist/whitelist.yaml:/root/deepfry/whitelist.yaml
      - ./config/whitelist/router.yaml:/root/deepfry/router.yaml
      # Bloom filter persistence (GATE-05): writable directory for the bloom plugin's
      # persisted filter so it survives container restarts. Override host path via
      # BLOOM_DATA_PATH env var. When using the bloom plugin, set bloom_path in
      # whitelist.yaml to a file under /root/deepfry/bloom-data/ (e.g.
      # bloom_path: /root/deepfry/bloom-data/bloom.dfbf).
      - ${BLOOM_DATA_PATH:-./data/bloom}:/root/deepfry/bloom-data
    ports:
      - "7777:7777" # Nostr WebSocket
    networks:
      - deepfry-net

  # Internal quarantine relay for non-whitelisted events. See quarantine/SPEC.md.
  # Shares the Dockerfile with mainline strfry (both plugins ship in the image).
  # The db path MUST differ from mainline — enforced by quarantine-db-guard.sh.
  strfry-quarantine:
    build:
      context: .
      dockerfile: Dockerfile.strfry
    container_name: strfry-quarantine
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/quarantine-db-guard.sh"]
    # Absolute path: the dockurr/strfry image keeps the binary at /app/strfry
    # and isn't in PATH, so the guard's `exec "$@"` would otherwise fail.
    command: ["/app/strfry", "--config=/etc/strfry.conf", "relay"]
    # Override the dockurr/strfry base image's baked-in HEALTHCHECK, which probes
    # http://localhost:7777/. This relay runs on 7778 (strfry-quarantine.conf), so the
    # inherited 7777 check always fails ("connection refused") and the container shows
    # (unhealthy) even though the relay is fine. Point the check at 7778.
    healthcheck:
      test: ["CMD-SHELL", "curl -ILfSs http://localhost:7778/ > /dev/null || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 2
    working_dir: /app
    environment:
      QUARANTINE_EXPECTED_DB: "/app/strfry-quarantine-db/"
      MAINLINE_DB_PATH: "/app/strfry-db/"
    volumes:
      - ${STRFRY_QUARANTINE_DB_PATH:-./data/strfry-quarantine-db}:/app/strfry-quarantine-db
      - ./config/strfry/strfry-quarantine.conf:/etc/strfry.conf:ro
      - ./config/strfry/quarantine-db-guard.sh:/usr/local/bin/quarantine-db-guard.sh:ro
      # NOTE: the mainline ./data/strfry-db volume is intentionally NOT mounted here.
      # Adding it would be a destructive misconfiguration; the guard (exit 4) catches it.
    ports:
      - "7778:7778" # Nostr WebSocket (quarantine)
    networks:
      - deepfry-net

networks:
  deepfry-net:
    external: true
    name: deepfry-net
